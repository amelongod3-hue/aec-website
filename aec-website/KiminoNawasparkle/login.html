<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 25px 80px rgba(0,0,0,0.4); }
        .form-input { width: 100%; padding: 14px 18px; border-radius: 12px; border: 2px solid #e5e7eb; font-size: 15px; transition: all 0.2s; background: #f9fafb; }
        .form-input:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249,115,22,0.1); outline: none; background: white; }
        .btn-primary { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; transition: 0.2s; border: none; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(249,115,22,0.4); }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; border-left: 4px solid #dc2626; }
        .brand-logo { width: 72px; height: 72px; background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 36px; margin: 0 auto 24px; }
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-logo">A</div>
    <div style="text-align: center; margin-bottom: 32px;">
        <h1 style="font-size: 26px; font-weight: 900; color: #111827;">AEC Admin Portal</h1>
        <p style="color: #6b7280; font-size: 15px;">Secure access to your dashboard</p>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm">
        <div style="margin-bottom: 20px;">
            <label class="block text-sm font-bold text-gray-700 mb-2">Username or Email</label>
            <input type="text" id="username" class="form-input" required autofocus>
        </div>
        <div style="margin-bottom: 24px;">
            <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" class="form-input" required>
                <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
            </div>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
    </form>
</div>
<script>
const API_URL = 'https://api.assembleeducationcommunity.org';

function togglePassword() {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
}

async function sha256(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
        errorDiv.textContent = 'Please enter both username and password';
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 4000);
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing In...';

    try {
        const password_hash = await sha256(password);
        const response = await fetch(`${API_URL}/api/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password_hash })
        });
        const data = await response.json();
        if (!data.success) throw new Error(data.error || 'Invalid credentials');
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_user', JSON.stringify(data.user));
        localStorage.setItem('admin_logged_in', 'true');
        window.location.href = 'dashboard.html';
    } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 4000);
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
});
</script>
</body>
</html>
