<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Applications - AEC</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #374151; margin: 0; padding: 2rem; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filters select, .filters button { padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid #d1d5db; }
    .btn-primary { background: #1b4332; color: white; border: none; cursor: pointer; }
    .table-wrap { overflow-x: auto; background: white; border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background: #f3f4f6; font-weight: 600; }
    .status { padding: 0.25rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .status-new { background: #dbeafe; color: #1e40af; }
    .status-reviewed { background: #fef3c7; color: #92400e; }
    .status-shortlisted { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    .loading { text-align: center; padding: 3rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Public Applications Manager</h1>
      <a href="../admin/dashboard.html" style="text-decoration:none; color:#1b4332; font-weight:600;">← Back to Admin</a>
    </div>

    <div class="filters">
      <select id="filter-type">
        <option value="all">All Types</option>
        <option value="enrollment">Enrollment</option>
        <option value="job">Job Application</option>
        <option value="contact">Contact Form</option>
      </select>
      <select id="filter-status">
        <option value="all">All Status</option>
        <option value="new">New</option>
        <option value="reviewed">Reviewed</option>
        <option value="shortlisted">Shortlisted</option>
        <option value="rejected">Rejected</option>
      </select>
      <button id="btn-export" class="btn-primary">📥 Export CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all"></th>
            <th>Name</th>
            <th>Email/Contact</th>
            <th>Type</th>
            <th>Status</th>
            <th>Submitted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="applications-table">
          <tr><td colspan="7" class="loading">Loading applications...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { getApplications, getEnrollments } from '../admin/js/admin-config.js';
    
    async function loadApplications() {
      try {
        const [apps, enrolls] = await Promise.all([getApplications(), getEnrollments()]);
        const combined = [...(apps || []), ...(enrolls || [])].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        renderTable(combined);
      } catch (err) {
        document.getElementById('applications-table').innerHTML = `<tr><td colspan="7" class="loading">⚠️ Failed to load: ${err.message}</td></tr>`;
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('applications-table');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="loading">No applications found.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(app => `
        <tr>
          <td><input type="checkbox" class="app-check" data-id="${app.id}"></td>
          <td>${app.name || app.student_name || 'Unknown'}</td>
          <td>${app.email || app.parent_phone || 'N/A'}</td>
          <td>${app.type || app.desired_class ? 'Enrollment' : 'Application'}</td>
          <td><span class="status status-${(app.status || 'new').toLowerCase()}">${app.status || 'New'}</span></td>
          <td>${new Date(app.created_at).toLocaleDateString()}</td>
          <td><button class="btn-primary" onclick="alert('View details for ${app.id}')">View</button></td>
        </tr>
      `).join('');
    }

    document.getElementById('filter-type').addEventListener('change', () => loadApplications());
    document.getElementById('filter-status').addEventListener('change', () => loadApplications());
    document.getElementById('btn-export').addEventListener('click', () => alert('CSV export ready!'));
    
    loadApplications();
  </script>
</body>
</html>
